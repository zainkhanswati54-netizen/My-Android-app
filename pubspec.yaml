name: titan_studio_pro
description: Titan Studio PRO - Professional TTS Voice Studio
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Networking ──────────────────────────────
  http: ^1.2.0

  # ── Audio ───────────────────────────────────
  just_audio: ^0.9.36

  # ── Storage / Files ─────────────────────────
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2

  # ── Permissions ─────────────────────────────
  permission_handler: ^11.3.0

  # ── Share ────────────────────────────────────
  share_plus: ^7.2.2

  # ── UI ───────────────────────────────────────
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  # ── Utils ────────────────────────────────────
  flutter_svg: ^2.0.10
  uuid: ^4.3.3
  intl: ^0.19.0

  # ── Firebase ─────────────────────────────────
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.0
  google_sign_in: ^6.2.1

  # ── ADS ──────────────────────────────────────
  dependencies:
  flutter:
    sdk: flutter
  google_mobile_ads: ^5.1.0 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/svg/
