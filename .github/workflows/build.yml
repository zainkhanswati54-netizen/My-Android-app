name: Titan AI Studio - Docker Success
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 5120
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Build with Docker (Auto-Confirm)
        run: |
          # 'yes' command khud hi 'y' type kar degi jab Buildozer sawal poochega
          # USER=root variable root ki warning ko bypass karne mein madad karega
          docker run --rm -v "$(pwd)":/home/user/hostpython \
          --env USER=root \
          kivy/buildozer:latest \
          /bin/bash -c "yes | buildozer android debug"
          
      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Titan-AI-Studio-V6
          path: bin/*.apk
