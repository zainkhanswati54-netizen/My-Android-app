name: Build APK (Titan AI Studio)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git ffmpeg libgstreamer1.0-dev \
            unzip zlib1g-dev libffi-dev libssl-dev python3-setuptools \
            libncurses5-dev libsqlite3-dev tk-dev libgdbm-dev \
            libc6-dev libbz2-dev libreadline-dev autoconf automake libtool \
            openjdk-17-jdk pkg-config

      - name: Install Python Packages
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      - name: Build APK (The Fixed Way)
        env:
          # Root warning ko ignore karne ka sabse paka tarika
          BUILDOZER_WARN_ON_ROOT: 0
        run: |
          # 'yes' command automates all 'y/n' prompts
          yes | buildozer -v android debug

      - name: Upload APK
        if: always() # Build fail bhi ho to logs upload honge
        uses: actions/upload-artifact@v4
        with:
          name: titan-ai-apk
          path: bin/*.apk
