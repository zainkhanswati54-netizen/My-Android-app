name: Build Titan AI APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-pip build-essential git python3-dev \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
            zlib1g-dev libssl-dev libbz2-dev libsqlite3-dev \
            gcc g++ unzip autoconf libtool ffmpeg imagemagick

      - name: Install Cython and Buildozer
        run: |
          pip3 install --user --upgrade pip
          pip3 install --user Cython==0.29.33 buildozer

      - name: Prepare assets folder
        run: |
          mkdir -p assets
          if [ ! -f assets/icon.png ]; then
            convert -size 512x512 xc:'#020817' \
              -fill '#3B82F6' -font DejaVu-Sans-Bold -pointsize 220 \
              -gravity Center -annotate 0 'SS' \
              assets/icon.png || true
          fi
          if [ ! -f assets/presplash.png ]; then
            convert -size 1080x1920 xc:'#020817' \
              -fill '#3B82F6' -font DejaVu-Sans-Bold -pointsize 280 \
              -gravity Center -annotate 0 'SS' \
              assets/presplash.png || true
          fi

      - name: Cache Buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: ~/.android
          key: android-sdk-${{ hashFiles('buildozer.spec') }}
          restore-keys: android-sdk-

      - name: Build APK
        run: |
          export PATH=$PATH:$HOME/.local/bin
          yes | buildozer -v android debug 2>&1 | tee build.log
          if [ ! -f bin/*.apk ]; then
            echo "APK nahi bani! Log dekho."
            exit 1
          fi
        env:
          ACCEPT_SDK_LICENSE: "True"

      - name: Upload build log always
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TitanAI-APK
          path: bin/*.apk
