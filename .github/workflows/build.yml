name: Titan AI Studio - Docker Power Fix
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Storage fix abhi bhi zaroori hai
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 5120
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      # DOCKER STRATEGY: Hum system par kuch install nahi karenge
      - name: Build with Buildozer (Docker Container)
        uses: ArtemSerebrennikov/buildozer-action@v1
        with:
          workdir: .
          buildozer_version: stable
          # Ye command buildozer ko container ke andar chalayegi
          command: android debug
          
      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Titan-AI-Studio-V6
          path: bin/*.apk
