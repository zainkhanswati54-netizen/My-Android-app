name: Titan AI God-Mode Build
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Free Disk Space (For Large APKs)
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo apt clean

      - name: Install Build Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git ffmpeg libgstreamer1.0-dev \
            unzip zlib1g-dev libffi-dev libssl-dev python3-setuptools \
            libncurses5-dev libsqlite3-dev tk-dev libgdbm-dev \
            libc6-dev libbz2-dev libreadline-dev autoconf automake libtool \
            openjdk-17-jdk pkg-config

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Buildozer & Cython
        run: |
          pip install --user --upgrade buildozer cython==0.29.33
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build Titan APK (The Auto-Solver)
        env:
          BUILDOZER_WARN_ON_ROOT: 0
        run: |
          # 'yes |' saare prompts ko khud hi 'y' kar dega
          export BUILDOZER_WARN_ON_ROOT=0
          yes | buildozer -v android debug

      - name: Upload Titan AI Studio V6 APK
        uses: actions/upload-artifact@v4
        with:
          name: Titan-AI-Studio-V6
          path: bin/*.apk
