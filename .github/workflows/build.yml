name: Titan AI Studio - Final Record Fix
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free Up Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"

      - name: Build with Docker (Bypass All Prompts)
        run: |
          docker run --rm -v "$(pwd)":/home/user/hostpython \
            -e BUILDOZER_WARN_ON_ROOT=0 \
            kivy/buildozer:latest \
            /bin/bash -c "export BUILDOZER_WARN_ON_ROOT=0 && buildozer android debug"
          
      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Titan-AI-Studio-V6
          path: bin/*.apk
