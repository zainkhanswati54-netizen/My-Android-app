# ============================================================
#  Titan Studio PRO - GitHub Actions Build Workflow
#  File location: .github/workflows/build.yml
#
#  Kab chalta hai:
#    - Jab bhi main branch pe code push ho
#    - Manually bhi chala sakte ho (Actions tab se)
#
#  Result:
#    - APK build hoti hai (25-35 min)
#    - Actions tab mein Artifacts section mein milti hai
#    - Download karke phone pe install karo
# ============================================================

name: Build Titan Studio PRO APK

on:
  # Jab bhi main ya master branch pe push ho
  push:
    branches:
      - main
      - master

  # Manually Actions tab se bhi chala sako
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-22.04  # Ubuntu 22.04 - best compatibility with buildozer

    steps:

      # ── Step 1: Code download karo ─────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step 2: Python setup ────────────────────────────────
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ── Step 3: Java setup (Android build ke liye) ──────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── Step 4: System dependencies ─────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git \
            zip \
            unzip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libssl-dev \
            libffi-dev \
            cmake \
            build-essential

      # ── Step 5: Python tools ────────────────────────────────
      - name: Install buildozer and cython
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.37

      # ── Step 6: Cache - pehle se downloaded SDK/NDK reuse ───
      # Yeh step bahut important hai - cache se build 10-15 min fast hoti hai
      - name: Cache buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-global-

      - name: Cache buildozer local directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-local-${{ hashFiles('buildozer.spec') }}-${{ hashFiles('main.py') }}
          restore-keys: |
            buildozer-local-${{ hashFiles('buildozer.spec') }}-
            buildozer-local-

      # ── Step 7: APK Build karo ──────────────────────────────
      - name: Build Debug APK
        if: ${{ github.event.inputs.build_type != 'release' }}
        run: |
          buildozer -v android debug 2>&1 | tee build_output.txt
          echo "Build exit code: $?"

      - name: Build Release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        run: |
          buildozer -v android release 2>&1 | tee build_output.txt

      # ── Step 8: APK file dhundo ─────────────────────────────
      - name: Find APK
        if: always()
        run: |
          echo "=== bin/ folder contents ==="
          ls -la bin/ 2>/dev/null || echo "bin/ folder nahi mila"
          echo ""
          echo "=== All APK files ==="
          find . -name "*.apk" 2>/dev/null || echo "Koi APK nahi mila"

      # ── Step 9: APK upload karo (download ke liye) ──────────
      - name: Upload APK (Debug)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TitanStudioPRO-v13.0.0-debug
          path: bin/*.apk
          retention-days: 30       # 30 din tak download kar sakte ho
          if-no-files-found: error

      # ── Step 10: Agar build fail ho toh log upload karo ─────
      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-error-log
          path: build_output.txt
          retention-days: 7

      # ── Step 11: Build summary ──────────────────────────────
      - name: Build Summary
        if: always()
        run: |
          echo "================================"
          echo "  Titan Studio PRO - Build Done"
          echo "================================"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Time: $(date)"
          echo ""
          if ls bin/*.apk 1>/dev/null 2>&1; then
            echo "STATUS: SUCCESS"
            echo "APK size: $(du -h bin/*.apk | cut -f1)"
            echo ""
            echo "APK download karne ke liye:"
            echo "GitHub → Actions tab → Is workflow run pe click karo"
            echo "→ Artifacts section mein milega"
          else
            echo "STATUS: FAILED"
            echo "Error log artifact mein dekho"
          fi
