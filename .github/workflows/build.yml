# =============================================================
#  Titan AI Studio Pro — .github/workflows/build.yml
#  Industry-Standard CI/CD Pipeline
#  Triggers: push to main OR manual dispatch
# =============================================================

name: 🚀 Build Titan AI APK

on:
  workflow_dispatch:
    inputs:
      debug_mode:
        description: 'Build in debug mode?'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
  push:
    branches: [main]
    paths:
      - 'main.py'
      - 'buildozer.spec'
      - '.github/workflows/build.yml'

# Cancel previous runs if a new push comes in
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: 🔨 Build Android APK
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:

      # ── 1. Checkout ──────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Java 17 (required by Android SDK) ─────────────────
      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Python 3.10 ───────────────────────────────────────
      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ── 4. System dependencies ───────────────────────────────
      - name: 📦 Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-pip build-essential git python3-dev \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev \
            libsdl2-ttf-dev libportmidi-dev libswscale-dev \
            libavformat-dev libavcodec-dev zlib1g-dev \
            libssl-dev libbz2-dev libsqlite3-dev \
            gcc g++ unzip autoconf libtool ffmpeg \
            libffi-dev libltdl-dev

      # ── 5. Python build tools ────────────────────────────────
      - name: 🔧 Install Cython & Buildozer
        run: |
          pip3 install --user --upgrade pip setuptools wheel
          pip3 install --user Cython==0.29.33 buildozer==1.5.0

      # ── 6. Cache: Buildozer global dir ───────────────────────
      - name: 💾 Cache Buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-global-${{ runner.os }}-

      # ── 7. Cache: Android SDK ────────────────────────────────
      - name: 💾 Cache Android SDK
        uses: actions/cache@v4
        with:
          path: ~/.android
          key: android-sdk-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            android-sdk-${{ runner.os }}-

      # ── 8. Cache: Gradle ─────────────────────────────────────
      - name: 💾 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── 9. Build APK ─────────────────────────────────────────
      - name: 🏗️ Build APK
        run: |
          export PATH=$PATH:$HOME/.local/bin
          yes | buildozer -v android debug 2>&1 | tee build.log
          echo "──────────────────────────────────────"
          if ls bin/*.apk 1>/dev/null 2>&1; then
            echo "✅ APK built successfully:"
            ls -lh bin/*.apk
          else
            echo "❌ APK build FAILED — check build.log artifact"
            exit 1
          fi
        env:
          ACCEPT_SDK_LICENSE: "True"
          BUILDOZER_WARN_ON_ROOT: "0"

      # ── 10. Get APK info ─────────────────────────────────────
      - name: 📊 APK build summary
        if: success()
        run: |
          APK=$(ls bin/*.apk | head -1)
          SIZE=$(du -sh "$APK" | cut -f1)
          NAME=$(basename "$APK")
          echo "## ✅ Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| APK Name | \`$NAME\` |" >> $GITHUB_STEP_SUMMARY
          echo "| APK Size | $SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run ID | ${{ github.run_id }} |" >> $GITHUB_STEP_SUMMARY

      # ── 11. Upload build log (always) ────────────────────────
      - name: 📋 Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build.log
          retention-days: 14

      # ── 12. Upload APK artifact ──────────────────────────────
      - name: 📱 Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TitanAI-Studio-Pro-v6-APK
          path: bin/*.apk
          retention-days: 30

      # ── 13. Failure notification ─────────────────────────────
      - name: ❌ Report failure
        if: failure()
        run: |
          echo "## ❌ Build Failed" >> $GITHUB_STEP_SUMMARY
          echo "Check the **build-log** artifact for details." >> $GITHUB_STEP_SUMMARY
          echo "Last 50 lines of log:" >> $GITHUB_STEP_SUMMARY
          tail -50 build.log >> $GITHUB_STEP_SUMMARY || true
