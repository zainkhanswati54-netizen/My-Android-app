name: Titan AI Studio God Mode
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup System
        run: |
          sudo apt update
          sudo apt install -y build-essential libffi-dev libssl-dev python3-pip python3-setuptools libltdl-dev
          # Cleaning up to avoid "Exit code 100"
          sudo apt autoremove -y

      - name: Install Build Tools
        run: |
          pip install --upgrade pip setuptools wheel
          pip install --upgrade Cython==0.29.33 buildozer

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # Single architecture build for faster and safer success
          yes | buildozer android debug
        env:
          ACCEPT_SDK_LICENSE: "True"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Titan-AI-Pro-v6
          path: bin/*.apk
