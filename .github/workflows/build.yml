# ============================================================
#  Titan Studio PRO - GitHub Actions Build Workflow
#  Version: 14.0.7 - ROOT WARNING FIX
#
#  FIX: Buildozer root user warning bypass
#  BUILDOZER_WARN_ON_ROOT=0 se confirmation skip hogi
# ============================================================

name: Build Titan Studio PRO APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build APK (Docker)
    runs-on: ubuntu-22.04

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Patch buildozer.spec
        run: |
          grep -q "android.build_tools_version" buildozer.spec || \
            echo "android.build_tools_version = 33.0.2" >> buildozer.spec
          tail -5 buildozer.spec

      - name: Build APK using Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/home/user/hostcwd \
            -e BUILDOZER_WARN_ON_ROOT=0 \
            --entrypoint /bin/bash \
            kivy/buildozer:latest \
            -c "
              set -e

              echo '=== Accepting SDK licenses ==='
              mkdir -p /home/user/.buildozer/android/platform/android-sdk/licenses
              echo '24333f8a63b6825ea9c5514f83c2829b004d1fee' > /home/user/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
              echo 'd56f5187479451eabf01fb78af6dfcb131a6481e' >> /home/user/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
              echo '84831b9409646a918e30573bab4c9c91346d8abd' > /home/user/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license

              echo '=== Installing build-tools 33.0.2 ==='
              yes | sdkmanager 'build-tools;33.0.2' 'platforms;android-33' || true

              echo '=== Fixing aidl ==='
              AIDL=\$(find /home/user/.buildozer -name 'aidl' 2>/dev/null | head -1)
              if [ -n \"\$AIDL\" ]; then
                ln -sf \"\$AIDL\" /usr/local/bin/aidl
                echo \"aidl linked: \$AIDL\"
              fi

              echo '=== Starting buildozer ==='
              cd /home/user/hostcwd
              export BUILDOZER_WARN_ON_ROOT=0
              buildozer android debug 2>&1 | tee build_output.txt
            "

      - name: Show build log
        if: always()
        run: tail -80 build_output.txt 2>/dev/null || echo "No log"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_output.txt
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TitanStudioPRO-v13-debug
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: error
