# ============================================================
#  Titan Studio PRO - GitHub Actions Build Workflow
#  Version: 14.0.5 - BASH FIX
#
#  FIX: kivy/buildozer image bash command issue fixed
#  Correct usage: buildozer command seedha pass karo
# ============================================================

name: Build Titan Studio PRO APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build APK (Docker)
    runs-on: ubuntu-22.04

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build APK using Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/home/user/hostcwd \
            kivy/buildozer:latest \
            android debug

      - name: Show build log
        if: always()
        run: |
          echo "====== BUILD LOG ======"
          cat build_output.txt 2>/dev/null || echo "Log file nahi mila"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_output.txt
          retention-days: 7
          if-no-files-found: ignore

      - name: Find and Upload APK
        if: success()
        run: |
          echo "=== Searching APK ==="
          find . -name "*.apk" 2>/dev/null
          ls -lh bin/*.apk 2>/dev/null || echo "bin/ mein APK nahi"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TitanStudioPRO-v13-debug
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: error
