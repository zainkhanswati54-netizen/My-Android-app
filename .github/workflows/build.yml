name: Titan AI Studio Final Build
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install System Tools
        run: |
          sudo apt update
          sudo apt install -y python3-pip build-essential git python3 python3-dev ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good libsqlite3-dev sqlite3 bzip2 libbz2-dev libssl-dev openssl libgdbm-dev libgdbm-compat-dev liblzma-dev libreadline-dev libncursesw5-dev libffi-dev uuid-dev tar bzip2 libncurses5-dev libncursesw5-dev libtinfo5 adb autopoint autoconf automake libtool pkg-config gettext

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33 kivy

      - name: Build Android APK
        run: |
          yes | buildozer android debug
        env:
          ACCEPT_SDK_LICENSE: "True"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Titan-AI-Studio-Pro
          path: bin/*.apk
