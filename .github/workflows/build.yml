# =============================================================
#  Titan AI Studio Pro — .github/workflows/build.yml
#  Version 10.1.0  |  edge-tts + aiohttp support added
#
#  SETUP:
#    1. Push all files to GitHub repo root:
#       main.py, buildozer.spec, requirements.txt, AI.png
#    2. Go to Actions tab → Run workflow
#    3. Download APK from Artifacts section
# =============================================================

name: Build Titan AI APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'main.py'
      - 'buildozer.spec'
      - 'requirements.txt'
      - 'AI.png'
      - '.github/workflows/build.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:

      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false

      # ── 2. Verify required files ─────────────────────────────
      - name: Verify required files
        run: |
          echo "=== Files in repo root ==="
          ls -la
          echo ""
          for f in main.py buildozer.spec AI.png requirements.txt; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              exit 1
            else
              echo "OK: $f ($(du -sh $f | cut -f1))"
            fi
          done

      # ── 3. Java 17 ───────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. Python 3.10 ───────────────────────────────────────
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ── 5. System packages ───────────────────────────────────
      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-pip build-essential git python3-dev \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev \
            libsdl2-ttf-dev libportmidi-dev libswscale-dev \
            libavformat-dev libavcodec-dev zlib1g-dev \
            libssl-dev libbz2-dev libsqlite3-dev \
            gcc g++ unzip autoconf libtool ffmpeg \
            libffi-dev libltdl-dev cmake pkg-config

      # ── 6. Python build tools ────────────────────────────────
      - name: Install Python build tools
        run: |
          pip3 install --upgrade pip setuptools wheel
          pip3 install Cython==0.29.33 buildozer==1.5.0

      # ── 7. Pre-install edge-tts (for build validation) ───────
      # This verifies edge-tts installs correctly before Android build
      - name: Verify edge-tts installs correctly
        run: |
          pip3 install edge-tts aiohttp
          python3 -c "import edge_tts; print('edge-tts OK:', edge_tts.__version__)"
          python3 -c "import aiohttp; print('aiohttp OK:', aiohttp.__version__)"

      # ── 8. Cache: Buildozer global ───────────────────────────
      - name: Cache Buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}-v2
          restore-keys: |
            buildozer-${{ runner.os }}-

      # ── 9. Cache: Android SDK ────────────────────────────────
      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: ~/.android
          key: android-sdk-${{ runner.os }}-api33-v2
          restore-keys: |
            android-sdk-${{ runner.os }}-

      # ── 10. Cache: Gradle ────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      # ── 11. Cache: pip packages ──────────────────────────────
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      # ── 12. Build APK ────────────────────────────────────────
      - name: Build APK with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          echo "=== buildozer.spec requirements section ==="
          grep -A 20 "^requirements" buildozer.spec
          echo ""
          echo "=== Starting build ==="
          yes | buildozer -v android debug 2>&1 | tee build.log
          echo ""
          echo "=== Checking APK output ==="
          if ls bin/*.apk 1>/dev/null 2>&1; then
            echo "APK built successfully:"
            ls -lh bin/*.apk
          else
            echo "APK build FAILED — last 50 lines of log:"
            tail -50 build.log
            exit 1
          fi
        env:
          ACCEPT_SDK_LICENSE: "True"
          BUILDOZER_WARN_ON_ROOT: "0"
          JAVA_HOME: /opt/hostedtoolcache/Java_Temurin_jdk/17.0.0-0/x64

      # ── 13. Build summary ────────────────────────────────────
      - name: Build summary
        if: success()
        run: |
          APK=$(ls bin/*.apk | head -1)
          SIZE=$(du -sh "$APK" | cut -f1)
          NAME=$(basename "$APK")
          echo "## Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| APK | \`$NAME\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Size | $SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | 10.1.0 |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| TTS Engine | edge-tts (Microsoft Neural) |" >> $GITHUB_STEP_SUMMARY

      # ── 14. Upload build log (always) ────────────────────────
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build.log
          retention-days: 14

      # ── 15. Upload APK (on success) ──────────────────────────
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TitanAI-Studio-Pro-v10.1-APK
          path: bin/*.apk
          retention-days: 30

      # ── 16. Failure report ───────────────────────────────────
      - name: Report failure details
        if: failure()
        run: |
          echo "## Build Failed" >> $GITHUB_STEP_SUMMARY
          echo "### Last 100 lines of build log:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -100 build.log >> $GITHUB_STEP_SUMMARY || echo "No build log found"
          echo '```' >> $GITHUB_STEP_SUMMARY
