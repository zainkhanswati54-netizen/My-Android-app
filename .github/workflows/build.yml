name: Titan AI Studio - Final Success Fix
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Naya Step: Faltu cheezein delete karke jagah banayein
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Build with Docker Direct
        run: |
          # Is baar hum Docker ko bata rahe hain ke 'yes' confirm kar de
          docker run --rm -v "$(pwd)":/home/user/hostpython \
          --env USER=root \
          kivy/buildozer:latest \
          /bin/bash -c "yes | buildozer android debug"
          
      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Titan-AI-Studio-V6
          path: bin/*.apk
