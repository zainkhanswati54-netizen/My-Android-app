# ============================================================
#  Titan Studio PRO - GitHub Actions Build Workflow
#  Version: 15.0.0 - NDK r27c FIX (NumPy 2.x C++ build error)
#
#  ROOT CAUSE: kivy/buildozer:latest downloads NDK r25b which has
#  a libc++ bug — <unordered_map> header missing — causing NumPy
#  2.x to fail compilation. NDK r27c fixes this completely.
# ============================================================

name: Build Titan Studio PRO APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build APK (Docker)
    runs-on: ubuntu-22.04

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build APK using Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/home/user/hostcwd \
            -e BUILDOZER_WARN_ON_ROOT=0 \
            --entrypoint /bin/bash \
            kivy/buildozer:latest \
            -c "
              set -e

              # ── Step A: wget install karo pehle ─────────────
              echo '=== Installing wget ==='
              apt-get update -qq && apt-get install -y wget unzip

              # ── Step B: cmdline-tools download ───────────────
              echo '=== Downloading Android cmdline-tools ==='
              mkdir -p /root/.buildozer/android/platform/android-sdk/cmdline-tools
              cd /tmp
              wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdtools.zip
              unzip -q cmdtools.zip
              mv cmdline-tools /root/.buildozer/android/platform/android-sdk/cmdline-tools/latest
              export PATH=/root/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin:\$PATH
              echo 'sdkmanager version:' && sdkmanager --version

              # ── Step C: Licenses ─────────────────────────────
              echo '=== Accepting licenses ==='
              mkdir -p /root/.buildozer/android/platform/android-sdk/licenses
              echo '24333f8a63b6825ea9c5514f83c2829b004d1fee' > /root/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
              echo 'd56f5187479451eabf01fb78af6dfcb131a6481e' >> /root/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
              echo '84831b9409646a918e30573bab4c9c91346d8abd' > /root/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
              yes | sdkmanager --sdk_root=/root/.buildozer/android/platform/android-sdk --licenses || true

              # ── Step D: build-tools install ──────────────────
              echo '=== Installing build-tools 33.0.2 ==='
              sdkmanager --sdk_root=/root/.buildozer/android/platform/android-sdk \
                'build-tools;33.0.2' \
                'platforms;android-33' \
                'platform-tools'

              # ── Step E: sdkmanager symlink ───────────────────
              mkdir -p /root/.buildozer/android/platform/android-sdk/tools/bin
              ln -sf /root/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager \
                /root/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
              echo 'symlink done'

              # ── Step F: aidl verify ──────────────────────────
              echo '=== aidl check ==='
              ls /root/.buildozer/android/platform/android-sdk/build-tools/33.0.2/aidl && echo 'aidl READY!'

              # ── Step G: Old Kivy cache saaf karo ─────────────
              # FIX: Kivy 2.3.0 Cython C files are incompatible with Python 3.14.
              # Kivy 2.3.1 has the fix. Remove old cached build so it recompiles.
              echo '=== Cleaning old Kivy + NumPy build cache ==='
              rm -rf /home/user/hostcwd/.buildozer/android/platform/build-arm64-v8a_armeabi-v7a/build/other_builds/kivy-sdl2 || true
              rm -rf /home/user/hostcwd/.buildozer/android/platform/build-arm64-v8a_armeabi-v7a/build/other_builds/numpy || true
              echo 'Cache cleared!'

              # ── Step H: NDK r27c manually install ────────────
              # FIX: Remove any old NDK r25b and pre-install NDK r27c
              # NDK r25b has a libc++ bug that breaks NumPy 2.x compilation.
              # By pre-installing r27c here, buildozer finds it already
              # present and skips its own download of r25b.
              echo '=== Installing NDK r27c (fixes NumPy 2.x build) ==='
              rm -rf /root/.buildozer/android/platform/android-ndk-r25b
              mkdir -p /root/.buildozer/android/platform
              cd /tmp
              wget -q https://dl.google.com/android/repository/android-ndk-r27c-linux.zip -O ndk.zip
              echo 'NDK downloaded, extracting...'
              unzip -q ndk.zip -d /root/.buildozer/android/platform/
              echo 'NDK r27c installed at:' && ls /root/.buildozer/android/platform/ | grep ndk

              # ── Step H: buildozer.spec patch ─────────────────
              cd /home/user/hostcwd
              grep -q 'android.build_tools_version' buildozer.spec || \
                echo 'android.build_tools_version = 33.0.2' >> buildozer.spec
              grep -q 'android.sdk_path' buildozer.spec || \
                echo 'android.sdk_path = /root/.buildozer/android/platform/android-sdk' >> buildozer.spec

              # Patch NDK version in spec to match our installed r27c
              sed -i 's/android.ndk = .*/android.ndk = 27c/' buildozer.spec
              # Patch Kivy version to 2.3.1 (Python 3.14 compatible)
              sed -i 's/kivy==2\.3\.0/kivy==2.3.1/' buildozer.spec
              echo 'buildozer.spec patched — NDK=27c, Kivy=2.3.1'
              grep 'android.ndk\|kivy==' buildozer.spec

              # ── Step I: BUILD ─────────────────────────────────
              echo '=== STARTING BUILD ==='
              export BUILDOZER_WARN_ON_ROOT=0
              buildozer android debug 2>&1 | tee build_output.txt
            "

      - name: Show build log
        if: always()
        run: tail -80 build_output.txt 2>/dev/null || echo "No log"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_output.txt
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TitanStudioPRO-debug
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: error
