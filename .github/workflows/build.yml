name: Titan AI Studio - Direct Docker Fix
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 5120
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      # Yahan hum direct Kivy ka official Docker image use kar rahe hain
      - name: Build with Docker Direct
        run: |
          docker run --rm -v "$(pwd)":/home/user/hostpython \
          kivy/buildozer:latest \
          android debug
          
      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Titan-AI-Studio-V6
          path: bin/*.apk
