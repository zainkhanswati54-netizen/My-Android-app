# ============================================================

name: Build Titan Studio PRO APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build APK (Docker)
    runs-on: ubuntu-22.04

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build APK using Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/home/user/hostcwd \
            -e ANDROID_SDK_ROOT=/home/user/.android/sdk \
            kivy/buildozer:latest \
            bash -c "cd /home/user/hostcwd && buildozer android debug 2>&1 | tee /home/user/hostcwd/build_output.txt; exit \${PIPESTATUS[0]}"

      - name: Show FULL build log
        if: always()
        run: |
          echo "====== FULL BUILD LOG ======"
          cat build_output.txt 2>/dev/null || echo "Log file nahi mila"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_output.txt
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TitanStudioPRO-v13-debug
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: error
