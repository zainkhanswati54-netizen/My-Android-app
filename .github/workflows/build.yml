# =============================================================
#  Titan Studio PRO — .github/workflows/build.yml
#  Version 12.0.0  |  FIXED EDITION
# =============================================================

name: Build Titan Studio PRO APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'main.py'
      - 'buildozer.spec'
      - 'requirements.txt'
      - 'AI.png'
      - 'p4a_recipes/**'
      - '.github/workflows/build.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:

      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Python 3.10 ───────────────────────────────────────
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ── 4. System packages ───────────────────────────────────
      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-pip build-essential git python3-dev \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev \
            libsdl2-ttf-dev libportmidi-dev libswscale-dev \
            libavformat-dev libavcodec-dev zlib1g-dev \
            libssl-dev libbz2-dev libsqlite3-dev \
            gcc g++ unzip autoconf libtool ffmpeg \
            libffi-dev libltdl-dev cmake pkg-config

      # ── 5. Fix Android SDK cmdline-tools ─────────────────────
      - name: Fix Android SDK cmdline-tools
        run: |
          ANDROID_SDK=/usr/local/lib/android/sdk
          CMDLINE_TOOLS=$ANDROID_SDK/cmdline-tools

          if [ -d "$CMDLINE_TOOLS/latest" ]; then
            echo "cmdline-tools/latest exists"
          elif [ -d "$CMDLINE_TOOLS" ]; then
            FIRST=$(ls $CMDLINE_TOOLS | head -1)
            ln -sf $CMDLINE_TOOLS/$FIRST $CMDLINE_TOOLS/latest
            echo "Linked $FIRST as latest"
          else
            mkdir -p $CMDLINE_TOOLS
            cd /tmp
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
            unzip -q commandlinetools-linux-9477386_latest.zip
            mv cmdline-tools $CMDLINE_TOOLS/latest
            echo "Fresh install done"
          fi

          echo "ANDROID_HOME=$ANDROID_SDK" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK" >> $GITHUB_ENV
          echo "$CMDLINE_TOOLS/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK/platform-tools" >> $GITHUB_PATH

          $CMDLINE_TOOLS/latest/bin/sdkmanager --version || true

      # ── 6. Accept SDK licenses ───────────────────────────────
      - name: Accept Android SDK licenses
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      # ── 7. Install Cython and Buildozer ──────────────────────
      - name: Install Cython and Buildozer
        run: |
          pip3 install --upgrade pip setuptools wheel
          pip3 install Cython==0.29.33
          pip3 install buildozer

      # ── 8. Verify edge-tts ───────────────────────────────────
      - name: Verify edge-tts
        run: |
          pip3 install edge-tts aiohttp websockets
          python3 -c "import edge_tts; print('edge-tts OK')"

      # ── 9. Cache: Buildozer ──────────────────────────────────
      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}-v4
          restore-keys: buildozer-${{ runner.os }}-

      # ── 10. Cache: Gradle ────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-v3
          restore-keys: gradle-${{ runner.os }}-

      # ── 11. Build APK ────────────────────────────────────────
      - name: Build APK
        run: |
          export PATH=$PATH:$HOME/.local/bin
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk

          echo "=== Files in repo ==="
          ls -la

          yes | buildozer -v android debug 2>&1 | tee build.log

          if ls bin/*.apk 1>/dev/null 2>&1; then
            echo "SUCCESS - APK built!"
            ls -lh bin/*.apk
          else
            echo "FAILED - last 60 lines:"
            tail -60 build.log
            exit 1
          fi

      # ── 12. Upload build log (always) ────────────────────────
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build.log
          retention-days: 14

      # ── 13. Upload APK ───────────────────────────────────────
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TitanStudio-PRO-v12-APK
          path: bin/*.apk
          retention-days: 30

      # ── 14. Failure details ───────────────────────────────────
      - name: Show failure details
        if: failure()
        run: |
          echo "=== Last 100 lines ==="
          tail -100 build.log || echo "No log"
