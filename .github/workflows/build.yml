name: Titan AI Studio - Master Build
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # STEP 1: GitHub Runner ki safayi (Crucial for Storage)
      - name: Extreme Disk Cleanup
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY"
          docker image prune --all --force
          df -h

      # STEP 2: Dependencies jo aksar log bhool jate hain
      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libffi-dev libssl-dev python3-pip python3-setuptools libltdl-dev libunwind-dev
          # libunwind-dev "Exit code 100" ko rokne ke liye zaroori hai

      - name: Setup Python and Build Tools
        run: |
          pip install --upgrade pip setuptools wheel
          pip install --upgrade Cython==0.29.33 buildozer

      # STEP 3: Clean state se build shuru karna
      - name: Build with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          buildozer android clean
          yes | buildozer android debug
        env:
          ACCEPT_SDK_LICENSE: "True"

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Titan-AI-Studio-V6
          path: bin/*.apk
