name: Build Titan Studio PRO APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build APK (Docker)
    runs-on: ubuntu-22.04

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build APK using Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/home/user/hostcwd \
            -e ANDROID_SDK_ROOT=/home/user/.android/sdk \
            kivy/buildozer:latest \
            bash -c "cd /home/user/hostcwd && buildozer android debug"

      - name: Find APK
        if: success()
        run: |
          find . -name "*.apk" 2>/dev/null
          ls -lh bin/*.apk 2>/dev/null || echo "APK not in bin/"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TitanStudioPRO-v13-debug
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_output.txt
          retention-days: 7
          if-no-files-found: ignore

      - name: Build Summary
        if: always()
        run: |
          echo "==============================="
          echo "  Titan Studio PRO Build Done"
          echo "==============================="
          if ls bin/*.apk 1>/dev/null 2>&1; then
            echo "APK    : $(ls bin/*.apk)"
            echo "Size   : $(du -h bin/*.apk | cut -f1)"
          else
            echo "APK    : NOT BUILT"
          fi
