# =============================================================
#  Titan AI Studio Pro — .github/workflows/build.yml
#  Industry-Standard CI/CD Pipeline  v6.1
# =============================================================

name: 🚀 Build Titan AI APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'main.py'
      - 'buildozer.spec'
      - 'AI.png'
      - '.github/workflows/build.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: 🔨 Build Android APK
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:

      # ── 1. Checkout ──────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false

      # ── 2. Verify AI.png exists ──────────────────────────────
      - name: ✅ Verify AI.png asset
        run: |
          echo "=== All files in repo root ==="
          ls -la
          echo ""
          if [ ! -f "AI.png" ]; then
            echo "❌ AI.png not found in repo root!"
            exit 1
          fi
          SIZE=$(du -sh AI.png | cut -f1)
          echo "✅ AI.png found — Size: $SIZE"
          file AI.png

      # ── 3. Java 17 ───────────────────────────────────────────
      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. Python 3.10 ───────────────────────────────────────
      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ── 5. System packages ───────────────────────────────────
      - name: 📦 Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-pip build-essential git python3-dev \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev \
            libsdl2-ttf-dev libportmidi-dev libswscale-dev \
            libavformat-dev libavcodec-dev zlib1g-dev \
            libssl-dev libbz2-dev libsqlite3-dev \
            gcc g++ unzip autoconf libtool ffmpeg \
            libffi-dev libltdl-dev

      # ── 6. Cython & Buildozer ────────────────────────────────
      - name: 🔧 Install Cython & Buildozer
        run: |
          pip3 install --user --upgrade pip setuptools wheel
          pip3 install --user Cython==0.29.33 buildozer==1.5.0

      # ── 7. Cache: Buildozer global ───────────────────────────
      - name: 💾 Cache Buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-${{ runner.os }}-

      # ── 8. Cache: Android SDK ────────────────────────────────
      - name: 💾 Cache Android SDK
        uses: actions/cache@v4
        with:
          path: ~/.android
          key: android-sdk-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: android-sdk-${{ runner.os }}-

      # ── 9. Cache: Gradle ─────────────────────────────────────
      - name: 💾 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      # ── 10. Build APK ─────────────────────────────────────────
      - name: 🏗️ Build APK
        run: |
          export PATH=$PATH:$HOME/.local/bin
          echo "=== Files before build ==="
          ls -la
          yes | buildozer -v android debug 2>&1 | tee build.log
          echo "=== Checking for APK ==="
          if ls bin/*.apk 1>/dev/null 2>&1; then
            echo "✅ APK built successfully:"
            ls -lh bin/*.apk
          else
            echo "❌ APK build FAILED"
            exit 1
          fi
        env:
          ACCEPT_SDK_LICENSE: "True"
          BUILDOZER_WARN_ON_ROOT: "0"

      # ── 11. Build summary ─────────────────────────────────────
      - name: 📊 Build summary
        if: success()
        run: |
          APK=$(ls bin/*.apk | head -1)
          SIZE=$(du -sh "$APK" | cut -f1)
          NAME=$(basename "$APK")
          echo "## ✅ Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| APK | \`$NAME\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Size | $SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY

      # ── 12. Upload build log ──────────────────────────────────
      - name: 📋 Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build.log
          retention-days: 14

      # ── 13. Upload APK ────────────────────────────────────────
      - name: 📱 Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TitanAI-Studio-Pro-APK
          path: bin/*.apk
          retention-days: 30

      # ── 14. Failure report ────────────────────────────────────
      - name: ❌ Report failure
        if: failure()
        run: |
          echo "## ❌ Build Failed" >> $GITHUB_STEP_SUMMARY
          tail -80 build.log >> $GITHUB_STEP_SUMMARY || true
