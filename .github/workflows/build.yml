name: Titan AI Studio - Out of the Box Fix
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # Storage fix ko simple rakhte hain
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 5120
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Install System Dependencies (The Smart Way)
        run: |
          sudo apt-get update
          # Sirf wo install karein jo lazmi hain, ziddi libraries (gstreamer) ko chhor dein
          sudo apt-get install -y build-essential libffi-dev libssl-dev python3-pip python3-setuptools git zip unzip
          # In cheezon ko force-install karein bina error ke rukay
          sudo apt-get install -y --no-install-recommends libltdl-dev libncurses5 libstdc++6

      - name: Build with Buildozer
        run: |
          pip install --upgrade pip setuptools wheel
          pip install --upgrade Cython==0.29.33 buildozer
          export PATH=$PATH:$HOME/.local/bin
          # Titan AI Studio ki purani cache saaf karein
          buildozer android clean
          # Log level 2 taake agar error aye to poori detail milay
          yes | buildozer -v android debug
        env:
          ACCEPT_SDK_LICENSE: "True"

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: Titan-AI-Studio-V6
          path: bin/*.apk
