name: Titan AI Studio - Final Power Fix
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Sabse pehle jagah banayein taake Docker na phanse
      - name: Free Up Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"

      - name: Build with Docker (Bypass Root Warning)
        run: |
          # 'yes' command khud hi 'y' type karegi
          # USER=root root warning ko bypass karne ke liye hai
          docker run --rm -v "$(pwd)":/home/user/hostpython \
          --env USER=root \
          kivy/buildozer:latest \
          /bin/bash -c "yes | buildozer android debug"
          
      - name: Upload Titan AI Studio APK
        uses: actions/upload-artifact@v4
        with:
          name: Titan-AI-Studio-V6
          path: bin/*.apk
