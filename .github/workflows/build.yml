# ============================================================
#  Titan Studio PRO - GitHub Actions Build Workflow
#  Version: 14.0.8 - ROOT PATH + LICENSE FINAL FIX
#
#  FIX 1: Licenses /root/.buildozer mein rakhi (root user hai Docker mein)
#  FIX 2: build-tools;37.0.0 ki jagah 33.0.2 force kiya
#  FIX 3: BUILDOZER_WARN_ON_ROOT=0 root warning bypass
# ============================================================

name: Build Titan Studio PRO APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build APK (Docker)
    runs-on: ubuntu-22.04

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Patch buildozer.spec
        run: |
          grep -q "android.build_tools_version" buildozer.spec || \
            echo "android.build_tools_version = 33.0.2" >> buildozer.spec
          tail -5 buildozer.spec

      - name: Build APK using Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/home/user/hostcwd \
            -e BUILDOZER_WARN_ON_ROOT=0 \
            --entrypoint /bin/bash \
            kivy/buildozer:latest \
            -c "
              set -e

              echo '=== Writing licenses to /root path ==='
              mkdir -p /root/.buildozer/android/platform/android-sdk/licenses
              echo '24333f8a63b6825ea9c5514f83c2829b004d1fee' > /root/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
              echo 'd56f5187479451eabf01fb78af6dfcb131a6481e' >> /root/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
              echo '84831b9409646a918e30573bab4c9c91346d8abd' > /root/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
              echo '601085b94cd77f0b54ff86406957099ebe79c4d6' > /root/.buildozer/android/platform/android-sdk/licenses/android-googletv-license
              echo '33b6a2b64607f11b759f320ef9dff4ae5c47d97a' > /root/.buildozer/android/platform/android-sdk/licenses/google-gdk-license
              echo 'Licenses written!'

              echo '=== Installing build-tools 33.0.2 via sdkmanager ==='
              yes | sdkmanager --sdk_root=/root/.buildozer/android/platform/android-sdk \
                'build-tools;33.0.2' 'platforms;android-33' 2>/dev/null || true

              echo '=== Checking aidl ==='
              find /root/.buildozer -name 'aidl' 2>/dev/null || echo 'aidl not found yet'

              echo '=== Starting buildozer ==='
              cd /home/user/hostcwd
              export BUILDOZER_WARN_ON_ROOT=0
              buildozer android debug 2>&1 | tee build_output.txt
            "

      - name: Show build log
        if: always()
        run: tail -80 build_output.txt 2>/dev/null || echo "No log"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_output.txt
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TitanStudioPRO-v13-debug
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: error
