name: Titan High-Quality Build
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Maximize Build Space
        run: |
          # Faltu tools aur SDKs delete kar rahe hain taake space banayie ja sakay
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          docker image prune --all --force
          df -h # Ye command aapko logs mein dikhayegi ke kitni space bachi hai

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libffi-dev libssl-dev python3-pip python3-setuptools

      - name: Install Build Tools
        run: |
          pip install --upgrade pip setuptools wheel
          pip install --upgrade Cython==0.29.33 buildozer

      - name: High Quality Build
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # Purana kachra saaf kar ke naye siray se build
          buildozer android clean
          yes | buildozer android debug
        env:
          ACCEPT_SDK_LICENSE: "True"

      - name: Upload High-Quality APK
        uses: actions/upload-artifact@v4
        with:
          name: Titan-AI-Studio-HQ
          path: bin/*.apk
