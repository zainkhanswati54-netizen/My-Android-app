name: Titan Final Success Build
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Fix Apt and Install Dependencies
        run: |
          sudo apt-get clean
          sudo apt-get update --fix-missing
          # Forcefully fixing broken dependencies
          sudo apt-get install -y -f
          sudo apt-get install -y build-essential libffi-dev libssl-dev python3-pip python3-setuptools

      - name: Install Build Tools
        run: |
          pip install --upgrade pip
          pip install --upgrade Cython==0.29.33 virtualenv buildozer

      - name: Build with Buildozer
        run: |
          # Adding path to ensure buildozer is found
          export PATH=$PATH:$HOME/.local/bin
          yes | buildozer android debug
        env:
          ACCEPT_SDK_LICENSE: "True"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Titan-AI-Studio-Pro
          path: bin/*.apk
