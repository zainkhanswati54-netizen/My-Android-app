name: Build Titan Studio PRO APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Setup Python & generate valid icons
        run: |
          pip install Pillow --quiet
          python3 << 'PYEOF'
import os
from PIL import Image, ImageDraw

def make_icon(size):
    img = Image.new('RGB', (size, size), (16, 185, 129))
    draw = ImageDraw.Draw(img)
    # White T letter
    s = size
    # horizontal bar
    draw.rectangle([s//4, s//4, s*3//4, s//4 + s//8], fill=(255,255,255))
    # vertical bar
    draw.rectangle([s*7//16, s//4, s*9//16, s*3//4], fill=(255,255,255))
    return img

sizes = {
    'mipmap-mdpi': 48,
    'mipmap-hdpi': 72,
    'mipmap-xhdpi': 96,
    'mipmap-xxhdpi': 144,
    'mipmap-xxxhdpi': 192,
}
base = 'titan_v2_fixed/android/app/src/main/res'
os.makedirs('titan_v2_fixed/assets/icons', exist_ok=True)
for folder, size in sizes.items():
    os.makedirs(f'{base}/{folder}', exist_ok=True)
    make_icon(size).save(f'{base}/{folder}/ic_launcher.png', 'PNG')
    print(f'OK: {folder}/ic_launcher.png ({size}x{size})')
make_icon(512).save('titan_v2_fixed/assets/icons/app_logo.png', 'PNG')
print('OK: app_logo.png')
PYEOF

      - name: Install dependencies
        working-directory: titan_v2_fixed
        run: flutter pub get

      - name: Build APK
        working-directory: titan_v2_fixed
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TitanStudioPRO-v2-release
          path: titan_v2_fixed/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
