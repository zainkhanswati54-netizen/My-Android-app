name: Titan AI Studio - Final Success
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 5120
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # Exit Code 100 ko khatam karne ke liye force-fix aur manual install
          sudo apt-get install -y -f
          sudo apt-get install -y build-essential libffi-dev libssl-dev python3-pip python3-setuptools git
          # Alag se install karein taake agar aik fail ho to pata chale
          sudo apt-get install -y libltdl-dev libunwind-dev

      - name: Build with Buildozer
        run: |
          pip install --upgrade pip setuptools wheel
          pip install --upgrade Cython==0.29.33 buildozer
          export PATH=$PATH:$HOME/.local/bin
          buildozer android clean
          yes | buildozer android debug
        env:
          ACCEPT_SDK_LICENSE: "True"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Titan-AI-Studio-V6
          path: bin/*.apk
