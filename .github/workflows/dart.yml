name: Build Titan Studio PRO APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Install Pillow
        run: pip install Pillow --quiet

      - name: Generate icons
        run: python3 generate_icons.py

      - name: Find Flutter project
        id: find_project
        run: |
          PUBSPEC=$(find . -name "pubspec.yaml" -not -path "*/.*" | head -1)
          PROJECT_DIR=$(dirname "$PUBSPEC")
          echo "project_dir=$PROJECT_DIR" >> $GITHUB_OUTPUT

      - name: Verify google-services.json exists
        run: |
          FILE=$(find . -name "google-services.json" | head -1)
          if [ -z "$FILE" ]; then
            echo "google-services.json not found!"
            exit 1
          fi
          echo "Found: $FILE"

      - name: Install dependencies
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        run: flutter pub get

      - name: Build APK
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TitanStudioPRO-release
          path: ${{ steps.find_project.outputs.project_dir }}/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
