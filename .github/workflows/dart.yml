name: Flutter Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        # Hum 'working-directory' use kar rahe hain taake GitHub folder ke andar jaye
        run: flutter pub get
        working-directory: titan_flutter

      - name: Build APK
        run: flutter build apk --release
        working-directory: titan_flutter

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: titan_flutter/build/app/outputs/flutter-apk/app-release.apk
