name: Build Titan Studio PRO APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Install dependencies
        working-directory: titan_v2_fixed
        run: flutter pub get

      - name: Build APK
        working-directory: titan_v2_fixed
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TitanStudioPRO-v2-release
          path: titan_v2_fixed/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
